spring:
  datasource:
    url: jdbc:tc:mysql:8.0:///ticketaca?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ticketaca-test-group
  flyway:
    enabled: true

management:
  endpoint:
    health:
      validate-group-membership: false
      probes:
        enabled: false
  health:
    redis:
      enabled: false

logging:
  level:
    com.ticketaca: DEBUG
